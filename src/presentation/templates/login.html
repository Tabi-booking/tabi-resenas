<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Iniciar sesión · Tabi Admin</title>
  <link rel="stylesheet" href="/css/admin.css"/>
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">
      <a class="nav-brand__logo" href="{{landingContactUrl}}" target="_blank" rel="noopener noreferrer" aria-label="Tabi — contacto">
        <img src="/assets/tabi-isotipo.png" alt="Tabi"/>
      </a>
      <span>Panel de reseñas</span>
    </div>
    <a class="nav-link" href="/" target="_blank">Ver formulario →</a>
  </nav>

  <div class="admin-page login-page">
    <p class="page-title">Tabi · Admin</p>
    <h1 class="page-heading">Iniciar sesión</h1>

    <div class="login-card">
      <p class="login-card__subtitle">Ingresa tu usuario y contraseña para acceder al panel de reseñas.</p>

      <form id="login-form" class="login-form" novalidate>
        <div class="field">
          <label for="username">Usuario</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Ej. adminlarock"
            autocomplete="username"
            required
          />
          <p class="field-hint">Usuario de acceso: <strong>adminlarock</strong></p>
          <div class="field-error" id="err-username"></div>
        </div>

        <div class="field">
          <label for="password">Contraseña</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Tu contraseña (no es el usuario)"
            autocomplete="current-password"
            required
          />
          <div class="field-error" id="err-password"></div>
        </div>

        <div class="field-error field-error--form" id="err-form"></div>

        <button type="submit" class="btn-login" id="btn-login">Entrar</button>
      </form>
    </div>
  </div>

  <script src="/js/login.js"></script>
</body>
</html>
