<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reseña {{venue}} · Tabi</title>
  <link rel="stylesheet" href="/css/form.css"/>
</head>
<body>
  <div class="page-bg" aria-hidden="true"></div>

  <div class="page">
    <header class="site-header">
      <a class="site-header__logo" href="{{landingContactUrl}}" target="_blank" rel="noopener noreferrer" aria-label="Tabi — contacto">
        <img src="/assets/tabi-imagotipo.png" alt="Tabi"/>
      </a>
      <span class="site-header__venue" aria-label="Restaurante {{venue}}">{{venue}}</span>
    </header>

    <main class="site-main">
      <div class="review-card">
        <div class="venue-hero" role="group" aria-label="{{venue}}">
          <div class="venue-hero__logo-wrap">
            <img
              class="venue-hero__logo"
              src="/assets/la-rock-logo.png?v=4"
              alt="La Rock Medellín Club House"
              width="320"
              height="120"
              decoding="async"
            />
          </div>
        </div>

        <h2 class="review-card__title">Comparte tu experiencia</h2>
        <p class="review-card__subtitle">
          Esta es la reseña de <strong class="review-card__venue">{{venue}}</strong>.
          Tu opinión nos ayuda a seguir mejorando y a que más personas descubran lo mejor del restaurante.
        </p>

        <form id="review-form" novalidate>
          <div class="field">
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" autocomplete="name"/>
            <div class="field-error" id="err-nombre"></div>
          </div>

          <div class="field">
            <label for="correo">Correo electrónico</label>
            <input type="email" id="correo" name="correo" placeholder="hola@ejemplo.com" autocomplete="email"/>
            <div class="field-error" id="err-correo"></div>
          </div>

          <div class="field">
            <label for="meseros">Mesero que te atendió</label>
            <input type="text" id="meseros" name="meseros" maxlength="100" placeholder="Ej. María, Carlos… (opcional)" autocomplete="off"/>
            <div class="field-error" id="err-meseros"></div>
          </div>

          <button type="submit" class="btn btn-primary btn-arrow" id="submit-btn">
            <span id="btn-text">Continuar</span>
          </button>
        </form>
      </div>
    </main>

    <footer class="site-footer">
      <div class="site-footer__brand">
        <a class="site-footer__logo" href="{{landingContactUrl}}" target="_blank" rel="noopener noreferrer" aria-label="Tabi — contacto">
          <img src="/assets/tabi-logotipo.png" alt="Tabi"/>
        </a>
        <span class="site-footer__copy">© 2025 Tabi · {{tagline}}</span>
      </div>
      <a class="site-footer__tagline" href="{{landingContactUrl}}" target="_blank" rel="noopener noreferrer">Powered by Tabi</a>
    </footer>
  </div>

  <script>
    window.TABI_REVIEW = {
      googleReviewUrl: {{googleReviewUrlJson}},
    };
  </script>
  <script src="/js/form.js"></script>
</body>
</html>
